<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/basket.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body onload="init()">
    <header>
        <nav class="header">
            <img class="headerIcons" src="./assets/icons/logo_icon.svg" alt="BestellApp Logo">
            <img class="headerIcons" src="./assets/icons/dehaze.png" alt="Aufklappmenü Icon">
        </nav>
    </header>
    <main>
        <section>
            <div class="bgBurgerLogo"></div>
            <div class="restaurantLogo">
                <img src="./assets/img/burger_logo.png" alt="Bild von Cartoon Burger">
            </div>
            <section class="headlineSection">
                <div class="headlineTitle">
                    <img class="headlineTitles" src="./assets/img/BurgerHouse.png" alt="BurgerHouse Text Überschrift">
                    <img class="headlineTitles" src="./assets/icons/like_icon.png"
                        alt="kleines bild mit Anzahl von Rezenseionen">
                </div>
                <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
            </section>
            <section class="linkMenu">
                <a class="linkButton" href="#burgerId">Burger</a>
                <a class="linkButton" href="#pizzaId">Pizza</a>
                <a class="linkButton" href="#saladId">Salads</a>
            </section>
        </section>

        <div class="mainContainer">
            <section id="main_content" class="mainContentSection">

            <section class="basketSection">
                <!-- <div class="basket" >
                <h3>Your Basket</h3>
                <p>Noting here yet. <br> Go ahead and choose something delicious!</p>
                <img class="basketIcon" src="./assets/icons/shopping_cart.png" alt="Icon von Einkaufswagen">
                </div> -->
                <div class="filledBasket">
                    <div class="closeIcons"><img role="button" tabindex="0" class="closingButton"
                            src="./assets/icons/dialog_close_icon.png" alt="Schließen Icon"></div>
                    <h2 class="basketTitle">Your Order</h2>
                    <div id="basket_content" class="basketOrders">
                        <div class="addedOrder">
                            <div>
                                <h4>Veggie mushroom black burger</h4>
                            </div>
                            <div class="basketIcons">
                                <img class="basketIcon" role="button" tabindex="0" src="./assets/icons/minus_icon.svg"
                                    alt="minus Icon">
                                <p>1x</p>
                                <img class="basketIcon" role="button" tabindex="0" src="./assets/icons/plus_icon.svg"
                                    alt="plus Icon">
                                <p>16,90€</p>
                                <img class="basketIcon" role="button" tabindex="0" src="./assets/icons/delete_icon.png"
                                    alt="Mülltonnen Icon">
                            </div>
                        </div>
                    </div>
                    <section class="costs">
                        <table class="costList">
                            <tr>
                                <td>Zwischensumme</td>
                                <td>16,90€</td>
                            </tr>
                            <tr>
                                <td>Lieferkosten</td>
                                <td>3,49€</td>
                            </tr>
                            <hr>
                            <tr>
                                <td>Gesamt</td>
                                <td>20,39€</td>
                            </tr>
                        </table>
                        <button class="buyButton">
                            <p>Buy Now (20,39€)</p>
                        </button>
                    </section>
                </div>
            </section>
            <!-- <dialog class="dialog" onclick="openDialog()">
                <div class="dialogWindow">
                        <img class="closingButton" role="button" tabindex="0" src="./assets/icons/dialog_close_icon.png" alt="">
                    <section class="orderConfirmedText">
                        <img src="./assets/icons/dialog_delivery_icon.png" alt="Lieferwagen Icon">
                        <img src="./assets/icons/ordered_text.png" alt="Order Confirmed Text">
                    </section>
                </div>
            </dialog> -->
        </div>
    </main>
    <footer>
        <p>© 2026 BestellApp. Alle Rechte vorbehalten.</p>
    </footer>
    <section class="nav_bottom_list">
        <button class="nav_item" onclick="location.href='./index.html'">
            <img src="./assets/icons/home_icon.svg" alt="Haus Icon">
        </button>
        <button class="nav_item">
            <img src="./assets/icons/shopping_cart_icon.svg" alt="Einkaufswagen Icon">
        </button>
        <button class="nav_item">
            <img src="./assets/icons/takeout_dining_icon.svg" alt="Icon vom Logo">
        </button>
        <button class="nav_item" onclick="openBasket()">
            <img src="./assets/icons/person_icon.svg" alt="Person Icon">
        </button>
    </section>
    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
</body>

</html>
