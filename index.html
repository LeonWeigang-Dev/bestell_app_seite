<!DOCTYPE html>
<html lang="de">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bestell App</title>
    <link rel="icon" href="./assets/icons/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./styles/assets.css">
    <link rel="stylesheet" href="./styles/fonts.css">
    <link rel="stylesheet" href="./styles/standard.css">
    <link rel="stylesheet" href="./style.css">
</head>

<body onload="init()">
    <header>
        <nav class="header">
            <img class="headerIcons" src="./assets/icons/logo_icon.svg" alt="BestellApp Logo">
            <img class="headerIcons" src="./assets/icons/dehaze.png" alt="Aufklappmenü Icon">
        </nav>
    </header>
    <main>
        <section>
            <div class="bgBurgerLogo"></div>
            <div class="restaurantLogo">
                <img src="./assets/img/burger_logo.png" alt="Bild von Cartoon Burger">
            </div>
            <section class="headlineSection">
                <div class="headlineTitle">
                    <img class="headlineTitles" src="./assets/img/BurgerHouse.png" alt="BurgerHouse Text Überschrift">
                    <img class="headlineTitles" src="./assets/icons/like_icon.png"
                        alt="kleines bild mit Anzahl von Rezenseionen">
                </div>
                <p>The best of Burgers, Pizza, and Greens, all in one great place.</p>
            </section>
            <section class="linkMenu">
                <a class="linkButton" href="#BurgerId">Burger</a>
                <a class="linkButton" href="#PizzaId">Pizza</a>
                <a class="linkButton" href="#SaladId">Salads</a>
            </section>
        </section>

        <div class="mainContainer">
            <section id="main_content" class="mainContentSection"></section>
            <section id="basket" class="basketSection">
            </section>
        </div>
    </main>
    <footer>
        <p>© 2026 BestellApp. Alle Rechte vorbehalten.</p>
    </footer>
    <section class="nav_bottom_list">
        <button class="nav_item" onclick="location.href='./index.html'">
            <img src="./assets/icons/home_icon.svg" alt="Haus Icon">
        </button>
        <button onclick="toggleBasket()" class="nav_item" style="position: relative;">
            <img src="./assets/icons/shopping_cart_icon.svg" alt="Einkaufswagen Icon">
            <div id="basket_badge" class="basket-badge" style="display: none;">0</div>
        </button>
        <button class="nav_item">
            <img src="./assets/icons/takeout_dining_icon.svg" alt="Icon vom Logo">
        </button>
        <button class="nav_item">
            <img src="./assets/icons/person_icon.svg" alt="Person Icon">
        </button>
    </section>
    <script src="./scripts/db.js"></script>
    <script src="./scripts/template.js"></script>
    <script src="./script.js"></script>
</body>

</html>
